<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#f7f4f1,#efe7ff,#fceee9);
    color:#1f2937;
    overflow-x:hidden;
}

/* =========================
   LOVE LETTER OVERLAY
========================= */
.letter-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    backdrop-filter:blur(10px);
}

.envelope{
    width:320px;
    height:200px;
    position:relative;
    cursor:pointer;
    transition:0.4s ease;
}

/* envelope base */
.body{
    width:100%;
    height:100%;
    background:#f5f5f5;
    border-radius:12px;
    position:absolute;
    bottom:0;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* flap */
.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#eaeaea;
    clip-path:polygon(0 0, 50% 50%, 100% 0);
    transform-origin:top;
    transition:0.6s ease;
    z-index:2;
}

/* letter */
.letter{
    position:absolute;
    bottom:0;
    width:100%;
    height:100%;
    background:white;
    border-radius:12px;
    padding:20px;
    transform:translateY(30px);
    opacity:0;
    transition:0.6s ease;
    z-index:1;
}

.letter h2{
    font-family:'Playfair Display',serif;
    margin-bottom:10px;
}

.letter p{
    font-size:0.9rem;
    line-height:1.5;
    opacity:0.8;
}

.sign{
    margin-top:10px;
    font-style:italic;
}

.open-btn{
    margin-top:15px;
    padding:10px 18px;
    border:none;
    border-radius:999px;
    background:#1f2937;
    color:white;
    cursor:pointer;
}

/* OPEN STATE */
.envelope.open .flap{
    transform:rotateX(180deg);
}

.envelope.open .letter{
    transform:translateY(-40px);
    opacity:1;
}

/* =========================
   MAIN PAGE
========================= */
.main{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:min(92%,650px);
    padding:40px;
    border-radius:24px;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
    text-align:center;
}

.location-box{
    margin-top:20px;
    padding:16px;
    border-radius:14px;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(10px);
}

.place-name{
    margin-top:6px;
    font-weight:500;
    opacity:0.8;
}

.map-btn{
    margin-top:10px;
    padding:10px 16px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    background:#1f2937;
    color:white;
    transition:0.2s ease;
}

.map-btn:hover{
    transform:translateY(-2px);
}

.title{
    font-family:'Playfair Display',serif;
    font-size:2rem;
    margin-bottom:12px;
}

.subtitle{
    font-size:1rem;
    opacity:0.8;
    margin-bottom:25px;
    line-height:1.6;
}

/* countdown */
.countdown-box{
    background:rgba(255,255,255,0.6);
    padding:16px;
    border-radius:14px;
    margin-bottom:25px;
}

.countdown{
    margin-top:8px;
}

/* buttons */
.buttons{
    display:flex;
    justify-content:center;
    gap:12px;
    position:relative;
    height:90px;
}

.btn{
    padding:12px 22px;
    border:none;
    border-radius:999px;
    cursor:pointer;
}

.yes-btn{
    background:#1f2937;
    color:white;
}

.no-btn{
    background:#6b7280;
    color:white;
    position:absolute;
    left:55%;
}

/* music */
.music{
    margin-top:20px;
}

.music button{
    padding:10px 16px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    margin:5px;
}

/* modal */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    display:flex;
    justify-content:center;
    align-items:center;
    opacity:0;
    visibility:hidden;
    transition:0.3s;
}

.modal.show{
    opacity:1;
    visibility:visible;
}

.modal-content{
    background:white;
    padding:30px;
    border-radius:18px;
    width:min(90%,420px);
    text-align:center;
}

/* responsive */
@media(max-width:600px){
    .card{
        padding:25px;
    }

    .title{
        font-size:1.5rem;
    }

    .buttons{
        flex-direction:column;
        height:auto;
    }

    .no-btn{
        position:relative;
        left:0;
    }
}
</style>
</head>

<body>

<!-- LOVE LETTER -->
<div class="letter-overlay" id="letterOverlay">
    <div class="envelope" id="envelope">
        <div class="flap"></div>
        <div class="body"></div>

        <div class="letter">
            <h2>Untuk Awak</h2>
            <p>
                Saya nak luangkan masa dengan awak.
                Kalau awak okay, jom kita keluar 17 Jun 2026.
            </p>
            <p class="sign">— Saya</p>

            <button class="open-btn" onclick="openSite()">Buka</button>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">
<div class="card">

    <h1 class="title">Nak keluar dengan saya hujung minggu ni?</h1>

    <p class="subtitle">
        Kalau awak free, saya plan something simple untuk kita.
    </p>

    <div class="countdown-box">
        📅 17 Jun 2026
        <div class="countdown" id="countdown"></div>
    </div>
	
	<div class="location-box">
    📍 Location: 
    <div class="place-name">Somewhere nice ☕</div>

    <button class="map-btn" onclick="openMap()">
        Open Location
    </button>
</div>

    <div class="buttons">
        <button class="btn yes-btn" id="yesBtn">Jom</button>
        <button class="btn no-btn" id="noBtn">Tak boleh</button>
    </div>

    <div class="music">
        <button onclick="playMusic()">▶ Play</button>
        <button onclick="pauseMusic()">⏸ Pause</button>
    </div>

</div>
</div>

<!-- AUDIO -->
<audio id="music" loop>
    <source src="YOUR_MUSIC_LINK.mp3">
</audio>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2>YAYY</h2>
        <p>Saya tunggu 17 Jun nanti tauuu.</p>
    </div>
</div>

<script>

/* LETTER ANIMATION */
const envelope = document.getElementById("envelope");

envelope.addEventListener("click",()=>{
    envelope.classList.add("open");
});

/* CLOSE LETTER + SHOW SITE */
function openSite(){
    document.getElementById("letterOverlay").style.display="none";
}

/* COUNTDOWN */
const target = new Date("2026-06-17T00:00:00");

function updateCountdown(){
    const now = new Date();
    const diff = target - now;

    const d = Math.floor(diff/(1000*60*60*24));
    const h = Math.floor((diff/(1000*60*60))%24);
    const m = Math.floor((diff/(1000*60))%60);
    const s = Math.floor((diff/1000)%60);

    document.getElementById("countdown").innerText =
    `${d} hari ${h} jam ${m} min ${s} saat`;
}

setInterval(updateCountdown,1000);
updateCountdown();

/* NO BUTTON MOVE */
const noBtn = document.getElementById("noBtn");

function moveNo(){
    const x = Math.random()*(window.innerWidth-120);
    const y = Math.random()*(window.innerHeight-60);

    noBtn.style.position="fixed";
    noBtn.style.left=x+"px";
    noBtn.style.top=y+"px";
}

noBtn.addEventListener("mouseenter",moveNo);
noBtn.addEventListener("click",moveNo);
noBtn.addEventListener("touchstart",moveNo);

/* MUSIC */
const music = document.getElementById("music");

function playMusic(){ music.play(); }
function pauseMusic(){ music.pause(); }

/* YES */
document.getElementById("yesBtn").addEventListener("click",()=>{
    document.getElementById("modal").classList.add("show");
});

document.getElementById("modal").addEventListener("click",()=>{
    document.getElementById("modal").classList.remove("show");
});

function openMap(){
    const url = "https://maps.app.goo.gl/zgzawBZG2mUHjtQ58";
    window.open(url, "_blank");
};

</script>

</body>
</html>
